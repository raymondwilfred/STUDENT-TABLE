<!DOCTYPE html>
<html>
<head>
  <title>✨ Student Table Pro UI </title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    h2 {
      text-align: center;
      color: white;
      margin-top: 20px;
      letter-spacing: 2px;
    }

    .table-container {
      width: 80%;
      margin: 30px auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
      color: white;
      padding: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 12px;
      transition: all 0.3s ease;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background: linear-gradient(135deg,green,yellow);
      transform: scale(1.02);
      cursor: pointer;
    }

    tr:hover td {
      font-weight: bold;
      color: #000;
    }

    td:hover {
      background-color: #ffeaa7;
      transform: scale(1.05);
    }

    .table-container {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

<h2>🎓 Student Details Dashboard</h2>

<div class="table-container">
  <table>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>College</th>
    </tr>

    <tr><td>Arjun</td><td>CSE</td><td>ABC College</td></tr>
    <tr><td>Ravi</td><td>ECE</td><td>XYZ College</td></tr>
    <tr><td>Sneha</td><td>IT</td><td>ABC College</td></tr>
    <tr><td>Kiran</td><td>MECH</td><td>PQR College</td></tr>
    <tr><td>Anjali</td><td>CSE</td><td>XYZ College</td></tr>
    <tr><td>Vikram</td><td>EEE</td><td>ABC College</td></tr>
    <tr><td>Priya</td><td>IT</td><td>PQR College</td></tr>
    <tr><td>Rahul</td><td>CIVIL</td><td>XYZ College</td></tr>
    <tr><td>Meena</td><td>ECE</td><td>ABC College</td></tr>
    <tr><td>Ajay</td><td>CSE</td><td>PQR College</td></tr>

  </table>
</div>

</body>
</html>
